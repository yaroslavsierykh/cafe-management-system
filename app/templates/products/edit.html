{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Редагування продукту</h1>
        <a href="{{ url_for('products.index') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад до списку
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">Назва</label>
                    <input type="text" class="form-control" id="name" name="name" 
                           value="{{ product.ProductName }}" required>
                </div>

                <div class="mb-3">
                    <label for="unit_id" class="form-label">Одиниця виміру</label>
                    <select class="form-select" id="unit_id" name="unit_id" required>
                        <option value="">Виберіть одиницю виміру</option>
                        {% for unit in units %}
                        <option value="{{ unit.UnitID }}" 
                                {% if unit.UnitID == product.MeasurementUnitID %}selected{% endif %}>
                            {{ unit.UnitName }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Опис</label>
                    <textarea class="form-control" id="description" name="description" 
                              rows="3">{{ product.Description or '' }}</textarea>
                </div>

                <div class="mb-3">
                    <label for="quantity" class="form-label">Кількість на складі</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" min="0" step="1" value="{{ '%.0f'|format(product.Quantity) }}" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="is_available" name="is_available"
                           {% if product.IsAvailable %}checked{% endif %}>
                    <label class="form-check-label" for="is_available">Доступний</label>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Зберегти зміни
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
