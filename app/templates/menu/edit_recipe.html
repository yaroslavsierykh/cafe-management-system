{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Рецепт страви "{{ dish.DishName }}"</h1>
        <a href="{{ url_for('menu.index') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад до меню
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form id="recipeForm">
                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5>Інгредієнти</h5>
                        <button type="button" class="btn btn-success btn-sm" onclick="addIngredient()">
                            <i class="fas fa-plus"></i> Додати інгредієнт
                        </button>
                    </div>
                    <div id="ingredients">
                        {% for ingredient in dish.ingredients %}
                        <div class="row mb-2 ingredient-row">
                            <div class="col-md-6">
                                <select class="form-select product-select" required>
                                    <option value="">Виберіть продукт</option>
                                    {% for product in products %}
                                    <option value="{{ product.ProductID }}"
                                            {% if product.ProductID == ingredient.ProductID %}selected{% endif %}>
                                        {{ product.ProductName }} ({{ product.measurement_unit.UnitName }})
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="number" class="form-control quantity-input" 
                                       placeholder="Кількість" step="0.01" min="0" 
                                       value="{{ ingredient.Quantity }}" required>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-danger btn-sm w-100" 
                                        onclick="removeIngredient(this)">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Зберегти рецепт
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function addIngredient() {
    const template = `
        <div class="row mb-2 ingredient-row">
            <div class="col-md-6">
                <select class="form-select product-select" required>
                    <option value="">Виберіть продукт</option>
                    {% for product in products %}
                    <option value="{{ product.ProductID }}">
                        {{ product.ProductName }} ({{ product.measurement_unit.UnitName }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <input type="number" class="form-control quantity-input" 
                       placeholder="Кількість" step="0.01" min="0" required>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-danger btn-sm w-100" 
                        onclick="removeIngredient(this)">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
    `;
    document.getElementById('ingredients').insertAdjacentHTML('beforeend', template);
}

function removeIngredient(button) {
    button.closest('.ingredient-row').remove();
}

document.getElementById('recipeForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const ingredients = [];
    const rows = document.querySelectorAll('.ingredient-row');
    
    rows.forEach(row => {
        const productId = row.querySelector('.product-select').value;
        const quantity = row.querySelector('.quantity-input').value;
        
        if (productId && quantity) {
            ingredients.push({
                product_id: parseInt(productId),
                quantity: parseFloat(quantity)
            });
        }
    });
    
    fetch('{{ url_for("menu.edit_recipe", dish_id=dish.DishID) }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ ingredients: ingredients })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            window.location.href = '{{ url_for("menu.index") }}';
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Помилка при збереженні рецепту');
    });
});

// Add initial ingredient row if none exist
if (document.querySelectorAll('.ingredient-row').length === 0) {
    addIngredient();
}
</script>
{% endblock %}
