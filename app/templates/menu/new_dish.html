{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Нова страва</h1>
        <a href="{{ url_for('menu.index') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад до меню
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">Назва</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>

                <div class="mb-3">
                    <label for="category_id" class="form-label">Категорія</label>
                    <select class="form-select" id="category_id" name="category_id" required>
                        <option value="">Виберіть категорію</option>
                        {% for category in categories %}
                        <option value="{{ category.CategoryID }}">
                            {{ category.CategoryName }} ({{ category.measurement_unit.UnitName }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Ціна (грн)</label>
                    <input type="number" class="form-control" id="price" name="price" 
                           step="0.01" min="0" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Опис</label>
                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="is_available" name="is_available" checked>
                    <label class="form-check-label" for="is_available">Доступна</label>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Зберегти та додати інгредієнти
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
