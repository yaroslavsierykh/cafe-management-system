{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Редагування категорії</h1>
        <a href="{{ url_for('menu.index') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад до меню
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">Назва категорії</label>
                    <input type="text" class="form-control" id="name" name="name" 
                           value="{{ category.CategoryName }}" required>
                </div>

                <div class="mb-3">
                    <label for="unit_id" class="form-label">Одиниця виміру за замовчуванням</label>
                    <select class="form-select" id="unit_id" name="unit_id" required>
                        <option value="">Виберіть одиницю виміру</option>
                        {% for unit in units %}
                        <option value="{{ unit.UnitID }}" 
                                {% if unit.UnitID == category.MeasurementUnitID %}selected{% endif %}>
                            {{ unit.UnitName }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Зберегти зміни
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
